name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Clone backend repository
        uses: actions/checkout@v6
        with:
          repository: tokisaki-galaxy/sc-shop-backend
          path: sc-shop-backend
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install System Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y jq xvfb tree ripgrep git

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f package.json ]; then
            pnpm install
          else
            echo "No package.json found, skipping dependency installation."
          fi

      - name: Initial Checks
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json found, skipping all JS-related checks."
            exit 0
          fi

          # 检查是否存在相应脚本或配置文件
          pnpm exec tsc -b || echo "No tsconfig found, skipping tsc"
          pnpm run lint || echo "No lint script found, skipping lint"

          # Prettier
          pnpm exec prettier --check . || echo "Prettier check failed or no files to check"

          # Vitest
          pnpm exec vitest run --coverage.enabled=false || echo "No tests found, skipping vitest"

          # Knip
          pnpm exec knip || echo "Knip check skipped"
